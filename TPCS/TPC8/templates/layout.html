<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfdfd; 
            color: #2d3436;
        }
        .navbar {
            padding: 1.5rem 0;
            background: transparent !important;
        }
        .nav-link {
            color: #004d40 !important;
            font-weight: 600;
            margin-left: 1.5rem;
            transition: opacity 0.3s;
        }
        .nav-link:hover { opacity: 0.7; }
        .navbar-brand {
            color: #004d40 !important;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }
        .btn-medical {
            background-color: #004d40;
            color: white;
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            margin-left: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-medical:hover {
            background-color: #00695c;
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 10px 20px rgba(0,77,64,0.15);
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">MED<span style="color: #00796b;">DICT.</span></a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="nav-link" href="/">Início</a>
                    <a class="nav-link" href="/conceitos">Dicionário</a>
                    <a class="nav-link" href="/tabela">Tabela</a>
                    <a class="btn-medical" href="/pesquisar">
                        <i class="bi bi-search" style="font-size: 0.9rem;"></i> Pesquisar
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block body %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
