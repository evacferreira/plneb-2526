{% extends 'layout.html' %}

{% block head %}
    <title>Dicionário Médico | Explorar</title>
    <style>
        .page-header {
            background: linear-gradient(135deg, #004d40 0%, #00796b 100%);
            border-radius: 30px;
            color: white;
            padding: 60px 20px;
            margin-bottom: 40px;
        }
        .search-container {
            max-width: 600px;
            margin: -60px auto 40px auto; /* Ajustado para flutuar melhor */
            position: relative;
            z-index: 10;
        }
        .search-input {
            border-radius: 50px !important;
            padding: 18px 30px !important;
            border: none !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15) !important;
            font-size: 1.1rem;
        }
        .concept-card {
            background: white;
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
            text-decoration: none !important;
            display: flex;
            align-items: center;
        }
        .concept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 77, 64, 0.1) !important;
        }
        .icon-circle {
            width: 45px;
            height: 45px;
            background: #e0f2f1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00796b;
            margin-right: 15px;
            flex-shrink: 0;
        }
    </style>
{% endblock %}

{% block body %}
    <div class="page-header text-center">
        <h1 class="display-5 fw-bold mb-2">Dicionário de Termos</h1>
        <p class="opacity-75 fs-5">Pesquise definições na nossa base de dados</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="form-control search-input" placeholder="Procure um conceito médico...">
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="conceptsGrid">
        {% for conceito in conceitos %}
        <div class="col concept-item"> 
            <a href="/conceitos/{{conceito}}" class="concept-card p-4 shadow-sm h-100">
                <div class="icon-circle">
                    <i class="bi bi-search"></i>
                </div>
                <div>
                    <h5 class="mb-0 text-dark fw-bold concept-title">{{conceito}}</h5>
                    <small class="text-muted text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Ver Detalhes</small>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>

    <script>
        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const items = document.querySelectorAll('.concept-item');

            items.forEach(item => {
                const title = item.querySelector('.concept-title').textContent.toLowerCase();
                // Se o termo de pesquisa estiver contido no título, mostra, senão esconde
                if (title.includes(searchTerm)) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        });
    </script>
{% endblock %}
